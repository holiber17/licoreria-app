<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Licorería</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Licorería">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  :root{
    --bg:#fff;--bg2:#f5f4f1;--bg3:#eceae4;
    --text:#1a1a1a;--text2:#6b6860;--text3:#a09d97;
    --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.2);
    --success:#1d7a4a;--success-bg:#e8f5ee;
    --warning:#8a5a00;--warning-bg:#fff3d6;
    --danger:#c0392b;--danger-bg:#fdf0ee;
    --info:#1a5fa8;--info-bg:#e8f1fb;
    --radius:10px;--radius-lg:14px;--max:480px;
  }
  .dark{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
    --success:#30d158;--success-bg:#0d2e1a;
    --warning:#ffd60a;--warning-bg:#2e2500;
    --danger:#ff453a;--danger-bg:#2e0d0a;
    --info:#0a84ff;--info-bg:#001a33;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;display:flex;justify-content:center;transition:background .2s,color .2s}
  .shell{width:100%;max-width:var(--max);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;position:relative}
  .hdr{background:var(--bg);border-bottom:.5px solid var(--border);padding:12px 16px 10px;position:sticky;top:0;z-index:20}
  .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .hdr-top h1{font-size:19px;font-weight:700;display:flex;align-items:center;gap:7px}
  .hdr-actions{display:flex;align-items:center;gap:8px}
  .icon-btn{width:34px;height:34px;border-radius:50%;border:.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:17px;transition:background .12s}
  .icon-btn:hover{background:var(--bg2)}
  .nav-tabs{display:flex;gap:3px;background:var(--bg2);border-radius:var(--radius);padding:4px}
  .nav-tab{flex:1;padding:7px 4px;border-radius:7px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:inherit;text-align:center;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px}
  .nav-tab.active{background:var(--bg);color:var(--text);border:.5px solid var(--border);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .content{flex:1;padding:16px}
  .sec{display:none}.sec.active{display:block}
  .scr{display:none}.scr.active{display:block}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .top-bar h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}
  .btn{padding:8px 14px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--text);font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .12s;font-weight:500}
  .btn:hover{background:var(--bg2)}.btn:active{transform:scale(.97)}
  .btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}.btn.primary:hover{opacity:.85}
  .btn.success{background:var(--success-bg);color:var(--success);border-color:var(--success)}
  .btn.danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
  .btn.sm{padding:5px 10px;font-size:12px}.btn.full{width:100%;justify-content:center}
  .card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px}
  .af{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:14px}
  .fg{margin-bottom:10px}
  .fg label{font-size:12px;color:var(--text2);font-weight:600;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
  .fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .12s}
  .fg input:focus,.fg select:focus{border-color:var(--info)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .fa{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
  .g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:14px}
  .cli-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;cursor:pointer;transition:all .15s}
  .cli-card:hover{border-color:var(--border2);transform:translateY(-1px)}
  .cli-card.activo{border-color:var(--warning)}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--info);flex-shrink:0}
  .pill{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
  .pill.activo{background:var(--warning-bg);color:var(--warning)}
  .pill.combo{background:var(--info-bg);color:var(--info)}
  .pill.suelto{background:var(--bg2);color:var(--text2)}
  .itabs{display:flex;gap:3px;background:var(--bg2);border-radius:var(--radius);padding:4px;margin-bottom:14px}
  .itab{flex:1;padding:7px 4px;border-radius:7px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:inherit;text-align:center;transition:all .15s;font-weight:500}
  .itab.active{background:var(--bg);color:var(--text);border:.5px solid var(--border);font-weight:600}
  .item-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:.5px solid var(--border)}
  .item-row:last-child{border-bottom:none}
  .ii{flex:1;min-width:0}
  .in{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .is{font-size:12px;color:var(--text2);margin-top:3px}
  .counter{display:flex;align-items:center;gap:8px}
  .cbtn{width:36px;height:36px;border-radius:50%;border:.5px solid var(--border2);background:var(--bg2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);line-height:1;transition:all .12s;font-family:inherit;-webkit-tap-highlight-color:transparent}
  .cbtn:active{transform:scale(.88);background:var(--bg3)}
  .cval{font-size:17px;font-weight:700;min-width:24px;text-align:center}
  .prog-bar{height:6px;border-radius:99px;background:var(--bg3);overflow:hidden;margin-top:6px}
  .prog-fill{height:100%;border-radius:99px;background:var(--success);transition:width .3s}
  .prog-fill.warn{background:var(--warning)}.prog-fill.full{background:var(--danger)}
  .mpick{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;cursor:pointer;transition:all .12s;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;-webkit-tap-highlight-color:transparent}
  .mpick:active{background:var(--info-bg)}
  .slabel{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px}
  .res-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;border-bottom:.5px solid var(--border)}
  .res-row:last-child{border-bottom:none}
  .total-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0 0;font-size:16px;font-weight:700;border-top:.5px solid var(--border2);margin-top:4px}
  .metric{background:var(--bg2);border-radius:var(--radius);padding:14px;text-align:center}
  .ml{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px}
  .mv{font-size:20px;font-weight:700}.mv.success{color:var(--success)}
  .hcard{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px}
  .empty{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px;line-height:1.7}
  .empty i{font-size:36px;display:block;margin-bottom:10px;color:var(--text3)}
  .sbar{width:100%;padding:10px 14px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit;margin-bottom:14px;outline:none}
  .sbar:focus{border-color:var(--info);background:var(--bg)}
  .mi{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:.5px solid var(--border)}
  .mi:last-child{border-bottom:none}
  .ch{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  /* tasa */
  .tbar{display:flex;align-items:center;flex-wrap:wrap;gap:8px;background:var(--bg2);border-radius:var(--radius);padding:9px 12px;margin-bottom:14px;font-size:13px;color:var(--text2)}
  .tbar input{width:90px;padding:4px 8px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;text-align:right;outline:none}
  .tbadge{font-size:11px;padding:3px 8px;border-radius:99px;font-weight:600;background:var(--success-bg);color:var(--success);display:inline-flex;align-items:center;gap:4px}
  .tbadge.loading{background:var(--warning-bg);color:var(--warning)}
  .tbadge.error{background:var(--danger-bg);color:var(--danger)}
  .mtoggle{display:flex;gap:4px;margin-left:auto}
  .mtbtn{padding:4px 10px;border-radius:99px;font-size:12px;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit;transition:all .12s;font-weight:500}
  .mtbtn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
  .dp{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
  .pusd{font-size:13px;font-weight:600}
  .pbs{font-size:11px;color:var(--text2)}
  /* PIN overlay */
  .pin-overlay{position:fixed;inset:0;background:var(--bg3);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
  .pin-overlay h2{font-size:20px;font-weight:700;color:var(--text)}
  .pin-dots{display:flex;gap:12px}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:background .15s}
  .pin-dot.filled{background:var(--text);border-color:var(--text)}
  .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
  .pin-btn{height:64px;border-radius:var(--radius-lg);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:22px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s;display:flex;align-items:center;justify-content:center}
  .pin-btn:active{background:var(--bg2);transform:scale(.93)}
  .pin-err{color:var(--danger);font-size:13px;font-weight:500;min-height:20px}
  /* install banner */
  .install-banner{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:12px 18px;border-radius:var(--radius-lg);font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.25);max-width:340px;width:90%}
  .install-banner button{padding:6px 12px;border-radius:var(--radius);background:var(--bg);color:var(--text);border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
</style>
</head>
<body>

<!-- PIN overlay -->
<div id="pin-overlay" class="pin-overlay" style="display:none">
  <div style="font-size:40px">🔒</div>
  <h2>Acceso a Licorería</h2>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-err" id="pin-err"></div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinPress('borrar')" style="font-size:18px"><i class="ti ti-backspace"></i></button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" onclick="pinPress('ok')" style="font-size:16px;background:var(--success-bg);color:var(--success)"><i class="ti ti-check"></i></button>
  </div>
  <button class="btn sm" onclick="skipPin()" style="margin-top:8px;color:var(--text2)">Continuar sin PIN</button>
</div>

<!-- Install banner -->
<div id="install-banner" class="install-banner" style="display:none">
  <span><i class="ti ti-download"></i> Instalar app en tu celular</span>
  <button id="install-btn">Instalar</button>
  <button onclick="document.getElementById('install-banner').style.display='none'" style="background:transparent;color:var(--bg);border:none;font-size:18px;cursor:pointer;padding:0">×</button>
</div>

<div class="shell" id="app">
  <div class="hdr">
    <div class="hdr-top">
      <h1><i class="ti ti-bottle"></i> Licorería</h1>
      <div class="hdr-actions">
        <button class="icon-btn" onclick="toggleDark()" id="dark-btn" title="Modo oscuro"><i class="ti ti-moon"></i></button>
        <button class="icon-btn" onclick="openPin()" title="PIN"><i class="ti ti-lock"></i></button>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" id="gnav-pedidos" onclick="switchGNav('pedidos')"><i class="ti ti-users"></i> Pedidos</button>
      <button class="nav-tab" id="gnav-menu" onclick="switchGNav('menu')"><i class="ti ti-book"></i> Menú</button>
      <button class="nav-tab" id="gnav-caja" onclick="switchGNav('caja')"><i class="ti ti-chart-bar"></i> Caja</button>
    </div>
  </div>

  <div class="content">
    <!-- TASA BCV -->
    <div class="tbar">
      <i class="ti ti-currency-dollar"></i>
      <span>1 USD =</span>
      <input id="tasa-input" type="number" min="1" step="0.01" value="530.50" onchange="saveTasa()">
      <span>Bs</span>
      <span id="tbadge" class="tbadge loading"><i class="ti ti-refresh"></i> Cargando...</span>
      <div class="mtoggle">
        <button class="mtbtn active" id="m-usd" onclick="setMoneda('usd')">USD</button>
        <button class="mtbtn" id="m-bs" onclick="setMoneda('bs')">Bs</button>
        <button class="mtbtn" id="m-both" onclick="setMoneda('both')">Ambas</button>
      </div>
    </div>

    <!-- PEDIDOS -->
    <div id="sec-pedidos" class="sec active">
      <div id="s-lista" class="scr active">
        <div class="top-bar">
          <h2>Pedidos activos</h2>
          <button class="btn sm primary" onclick="toggleNuevo()"><i class="ti ti-plus"></i> Nuevo</button>
        </div>
        <div id="form-nuevo" style="display:none" class="af">
          <div class="fg"><label>Nombre del cliente, grupo o mesa</label>
            <input id="nuevo-nombre" placeholder="Ej: Carlos, Mesa 4, VIP..." onkeydown="if(event.key==='Enter')crearCliente()">
          </div>
          <div class="fa">
            <button class="btn sm" onclick="toggleNuevo()">Cancelar</button>
            <button class="btn sm primary" onclick="crearCliente()"><i class="ti ti-check"></i> Abrir</button>
          </div>
        </div>
        <input class="sbar" id="buscador" placeholder="Buscar..." oninput="renderLista()">
        <div id="cli-grid" class="g2"></div>
      </div>

      <div id="s-detalle" class="scr">
        <div class="top-bar">
          <button class="btn sm" onclick="goLista()"><i class="ti ti-arrow-left"></i> Volver</button>
          <div style="display:flex;align-items:center;gap:8px">
            <div id="det-avatar" class="avatar" style="width:30px;height:30px;font-size:12px"></div>
            <span id="det-nombre" style="font-size:15px;font-weight:600"></span>
          </div>
          <button class="btn sm success" onclick="cobrarPedido()"><i class="ti ti-cash"></i> Cobrar</button>
        </div>
        <button class="btn sm danger full" onclick="cerrarSinCobrar()" style="margin-bottom:12px"><i class="ti ti-x"></i> Cancelar sin cobrar</button>
        <div class="itabs">
          <button class="itab active" id="tab-consumo" onclick="switchTab('consumo')">Consumo</button>
          <button class="itab" id="tab-agregar" onclick="switchTab('agregar')">Agregar</button>
          <button class="itab" id="tab-cuenta" onclick="switchTab('cuenta')">Cuenta</button>
        </div>
        <div id="mt-consumo"><div id="consumo-list" class="card"></div></div>
        <div id="mt-agregar" style="display:none">
          <div id="menu-picks"></div>
          <div style="margin-bottom:10px"><button class="btn sm" onclick="toggleCustom()"><i class="ti ti-pencil"></i> Personalizado</button></div>
          <div id="custom-form" style="display:none" class="af">
            <div class="fg"><label>Tipo</label>
              <select id="tipo-item" onchange="toggleTipo()"><option value="combo">Combo / paquete</option><option value="suelto">Bebida suelta</option></select>
            </div>
            <div class="fg"><label>Nombre</label><input id="item-nombre" placeholder="Nombre del producto"></div>
            <div id="f-combo" class="fg"><label>Total unidades</label><input id="item-total" type="number" placeholder="10" min="1"></div>
            <div id="f-suelto" style="display:none" class="fg"><label>Cantidad</label><input id="item-cant" type="number" placeholder="1" min="1"></div>
            <div class="row2">
              <div class="fg"><label>Precio USD</label><input id="item-precio" type="number" placeholder="0.00" min="0" step="0.01"></div>
              <div class="fg"><label>Unidad</label><input id="item-unidad" placeholder="lata..."></div>
            </div>
            <div class="fa"><button class="btn primary" onclick="agregarItemCustom()"><i class="ti ti-check"></i> Agregar</button></div>
          </div>
        </div>
        <div id="mt-cuenta" style="display:none">
          <div class="card">
            <div id="cuenta-list"></div>
            <div class="total-row"><span>Total</span><div id="cuenta-total"></div></div>
          </div>
          <!-- nota al cobrar -->
          <div class="af" style="margin-top:10px">
            <div class="fg"><label>Nota (opcional)</label>
              <input id="nota-cobro" placeholder="Ej: Pagó en efectivo, quedó debiendo $2...">
            </div>
          </div>
          <button class="btn success full" onclick="cobrarPedido()"><i class="ti ti-cash"></i> Registrar cobro y cerrar</button>
        </div>
      </div>
    </div>

    <!-- MENÚ -->
    <div id="sec-menu" class="sec">
      <div class="top-bar"><h2>Menú</h2><button class="btn sm primary" onclick="toggleMenuForm()"><i class="ti ti-plus"></i> Producto</button></div>
      <div id="menu-form" style="display:none" class="af">
        <div class="fg"><label>Tipo</label>
          <select id="mf-tipo" onchange="toggleMfTipo()"><option value="combo">Combo / paquete</option><option value="suelto">Bebida suelta</option></select>
        </div>
        <div class="fg"><label>Nombre</label><input id="mf-nombre" placeholder="Ej: Combo Polar x12..."></div>
        <div id="mf-combo-f" class="fg"><label>Unidades por combo</label><input id="mf-total" type="number" placeholder="12" min="1"></div>
        <div class="fg"><label>Precio por unidad (USD $)</label><input id="mf-precio" type="number" placeholder="0.00" min="0" step="0.01"></div>
        <div class="row2">
          <div class="fg"><label>Unidad</label><input id="mf-unidad" placeholder="lata, botella..."></div>
          <div class="fg"><label>Categoría</label><input id="mf-cat" placeholder="Cerveza, Ron..."></div>
        </div>
        <div class="fa">
          <button class="btn sm" onclick="toggleMenuForm()">Cancelar</button>
          <button class="btn sm primary" onclick="guardarMenuProduct()"><i class="ti ti-check"></i> Guardar</button>
        </div>
      </div>
      <div id="menu-list"></div>
    </div>

    <!-- CAJA -->
    <div id="sec-caja" class="sec">
      <div class="top-bar"><h2>Caja del día</h2><button class="btn sm danger" onclick="resetCaja()"><i class="ti ti-refresh"></i> Nueva jornada</button></div>
      <div class="g2" id="caja-metrics"></div>
      <div class="itabs">
        <button class="itab active" id="ctab-historial" onclick="switchCajaTab('historial')">Historial</button>
        <button class="itab" id="ctab-productos" onclick="switchCajaTab('productos')">Por producto</button>
      </div>
      <div id="cmt-historial"><div id="caja-historial"></div></div>
      <div id="cmt-productos" style="display:none"><div class="card"><div id="caja-productos"></div></div></div>
    </div>
  </div>
</div>

<script>
// ---- STATE ----
const SK='lic_ve_v2';
let st=JSON.parse(localStorage.getItem(SK)||'null')||{
  tasa:530.50,moneda:'both',dark:false,pin:null,
  menu:[

let actual=null;

function save(){localStorage.setItem(SK,JSON.stringify(st));}
function ini(n){return n.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');}
function ts(){return new Date().toLocaleString('es-VE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
function tasa(){return parseFloat(document.getElementById('tasa-input').value)||st.tasa;}
function saveTasa(){st.tasa=tasa();save();refreshAll();}
function fmtUSD(n){return '$'+n.toFixed(2);}
function fmtBs(n){return 'Bs '+Math.round(n*tasa()).toLocaleString('es-VE');}
function fmtPrice(n){if(st.moneda==='usd')return fmtUSD(n);if(st.moneda==='bs')return fmtBs(n);return fmtUSD(n)+' / '+fmtBs(n);}
function fmtDual(n){
  if(st.moneda==='usd')return `<span style="font-size:14px;font-weight:600">${fmtUSD(n)}</span>`;
  if(st.moneda==='bs')return `<span style="font-size:14px;font-weight:600">${fmtBs(n)}</span>`;
  return `<div class="dp"><span class="pusd">${fmtUSD(n)}</span><span class="pbs">${fmtBs(n)}</span></div>`;
}
function setMoneda(m){st.moneda=m;save();['usd','bs','both'].forEach(x=>document.getElementById('m-'+x).classList.toggle('active',x===m));refreshAll();}
function refreshAll(){renderLista();if(actual){renderConsumo();renderCuenta();}renderMenu();renderCaja();}

// ---- DARK MODE ----
function applyDark(){

  document.getElementById('dark-btn').innerHTML=st.dark?'<i class="ti ti-sun"></i>':'<i class="ti ti-moon"></i>';
}

// ---- SOUND ----
function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=520;g.gain.setValueAtTime(.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.12);
    o.start();o.stop(ctx.currentTime+.12);
  }catch(e){}
}
function vibrate(){if(navigator.vibrate)navigator.vibrate(40);}
function feedback(){beep();vibrate();}

// ---- PIN ----
let pinBuffer='';
let pinMode='check'; // 'check' | 'set'
let pinCallback=null;

function openPin(){
  if(st.pin){
    showPinOverlay('check',()=>{});
  } else {
    if(!confirm('¿Deseas activar un PIN de acceso?'))return;
    showPinOverlay('set',()=>{alert('✅ PIN activado correctamente.');});
  }
}
function showPinOverlay(mode,cb){
  pinMode=mode;pinCallback=cb;pinBuffer='';
  updatePinDots();
  document.getElementById('pin-err').textContent=mode==='set'?'Ingresa un PIN de 4 dígitos':'';
  document.getElementById('pin-overlay').style.display='flex';
}
function skipPin(){document.getElementById('pin-overlay').style.display='none';}
function pinPress(k){
  if(k==='borrar'){pinBuffer=pinBuffer.slice(0,-1);updatePinDots();return;}
  if(k==='ok'){checkPin();return;}
  if(pinBuffer.length>=4)return;
  pinBuffer+=k;updatePinDots();
  if(pinBuffer.length===4)setTimeout(checkPin,200);
}
function updatePinDots(){
  for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('filled',i<pinBuffer.length);
}
function checkPin(){
  if(pinBuffer.length<4){document.getElementById('pin-err').textContent='Ingresa 4 dígitos';return;}
  if(pinMode==='set'){
    st.pin=pinBuffer;save();
    document.getElementById('pin-overlay').style.display='none';
    if(pinCallback)pinCallback();
  } else {
    if(pinBuffer===st.pin){
      document.getElementById('pin-overlay').style.display='none';
      if(pinCallback)pinCallback();
    } else {
      document.getElementById('pin-err').textContent='PIN incorrecto. Intenta de nuevo.';
      pinBuffer='';updatePinDots();vibrate();
    }
  }
}

// ---- BCV API ----
async function fetchTasaBCV(){
  const b=document.getElementById('tbadge');
  b.className='tbadge loading';b.innerHTML='<i class="ti ti-refresh"></i> Cargando...';
  try{
    const r=await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
    if(!r.ok)throw new Error();
    const d=await r.json();
    const t=parseFloat(d.promedio);
    if(!t||isNaN(t))throw new Error();
    document.getElementById('tasa-input').value=t.toFixed(2);
    st.tasa=t;save();
    const fecha=d.fechaActualizacion?new Date(d.fechaActualizacion).toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit'}):'';
    b.className='tbadge';b.innerHTML=`<i class="ti ti-check"></i> BCV${fecha?' · '+fecha:''}`;
    refreshAll();
  }catch(e){
    b.className='tbadge error';b.innerHTML='<i class="ti ti-wifi-off"></i> Sin conexión — manual';
  }
}

// ---- CLIENTES ----
function crearCliente(){
  const n=document.getElementById('nuevo-nombre').value.trim();
  if(!n){alert('Escribe un nombre');return;}
  const c={id:st.nextCli++,nombre:n,items:[],abierto:ts()};
  st.clientes.push(c);
  document.getElementById('nuevo-nombre').value='';
  document.getElementById('form-nuevo').style.display='none';
  save();abrirCliente(c.id);
}
function renderLista(){
  const q=(document.getElementById('buscador').value||'').toLowerCase();
  const lista=st.clientes.filter(c=>c.nombre.toLowerCase().includes(q));
  const g=document.getElementById('cli-grid');
  if(!lista.length){g.innerHTML='<div class="empty" style="grid-column:1/-1"><i class="ti ti-users"></i>Sin pedidos activos.<br>Toca "+ Nuevo".</div>';return;}
  g.innerHTML=lista.map(c=>{
    const total=c.items.reduce((s,i)=>s+(i.consumido*i.precio),0);
    return `<div class="cli-card activo" onclick="abrirCliente(${c.id})">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div class="avatar">${ini(c.nombre)}</div>
        <span style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.nombre}</span>
      </div>
      <span class="pill activo">Activo</span>
      <div style="font-size:11px;color:var(--text2);margin-top:5px">${c.items.length} ítem(s) · ${fmtPrice(total)}</div>
    </div>`;
  }).join('');
}
function abrirCliente(id){
  actual=st.clientes.find(c=>c.id===id);
  document.getElementById('det-nombre').textContent=actual.nombre;
  document.getElementById('det-avatar').textContent=ini(actual.nombre);
  document.getElementById('nota-cobro').value='';
  showScr('s-detalle');switchTab('consumo');
}
function cerrarSinCobrar(){
  if(!actual)return;
  if(!confirm('¿Cancelar el pedido sin cobrar?'))return;
  st.clientes=st.clientes.filter(c=>c.id!==actual.id);
  actual=null;save();goLista();
}
function cobrarPedido(){
  if(!actual)return;
  const items=actual.items.filter(i=>i.consumido>0);
  if(!items.length){alert('No hay nada consumido aún.');return;}
  const total=items.reduce((s,i)=>s+(i.consumido*i.precio),0);
  const nota=document.getElementById('nota-cobro').value.trim();
  if(!confirm(`¿Cobrar ${fmtUSD(total)} (${fmtBs(total)}) a ${actual.nombre}?`))return;
  st.caja.push({id:Date.now(),nombre:actual.nombre,items:items.map(i=>({nombre:i.nombre,consumido:i.consumido,precio:i.precio,subtotal:i.consumido*i.precio})),total,fecha:ts(),tasa:tasa(),nota});
  st.clientes=st.clientes.filter(c=>c.id!==actual.id);
  actual=null;save();goLista();switchGNav('caja');
  feedback();
}

// ---- MENU PICKS ----
function renderMenuPicks(){
  const el=document.getElementById('menu-picks');
  if(!st.menu.length){el.innerHTML='<div class="empty">Menú vacío.</div>';return;}
  const combos=st.menu.filter(m=>m.tipo==='combo');
  const sueltos=st.menu.filter(m=>m.tipo==='suelto');
  let html='';
  if(combos.length){html+='<div class="slabel">Combos</div>';html+=combos.map(m=>`<div class="mpick" onclick="agregarDesdeMenu(${m.id})"><div><div style="font-size:14px;font-weight:600">${m.nombre}</div><div style="font-size:12px;color:var(--text2)">${m.total} ${m.unidad}s · ${fmtPrice(m.precio)} c/u</div></div><span class="pill combo">Combo</span></div>`).join('');}
  if(sueltos.length){html+='<div class="slabel">Bebidas sueltas</div>';html+=sueltos.map(m=>`<div class="mpick" onclick="agregarDesdeMenu(${m.id})"><div><div style="font-size:14px;font-weight:600">${m.nombre}</div><div style="font-size:12px;color:var(--text2)">${m.cat} · ${fmtPrice(m.precio)} c/u</div></div><span class="pill suelto">Suelta</span></div>`).join('');}
  el.innerHTML=html;
}
function agregarDesdeMenu(menuId){
  const prod=st.menu.find(m=>m.id===menuId);if(!prod)return;
  let cant=1;
  if(prod.tipo==='suelto'){const inp=prompt(`¿Cuántas ${prod.unidad}s de "${prod.nombre}"?`,'1');if(inp===null)return;cant=parseInt(inp)||1;if(cant<1)return;}
  actual.items.push({id:st.nextItem++,tipo:prod.tipo,nombre:prod.nombre,total:prod.tipo==='combo'?prod.total:cant,consumido:0,precio:prod.precio,unidad:prod.unidad});
  save();switchTab('consumo');feedback();
}
function toggleCustom(){const f=document.getElementById('custom-form');f.style.display=f.style.display==='none'?'block':'none';}
function toggleTipo(){const v=document.getElementById('tipo-item').value;document.getElementById('f-combo').style.display=v==='combo'?'block':'none';document.getElementById('f-suelto').style.display=v==='suelto'?'block':'none';}
function agregarItemCustom(){

// ---- CONSUMO ----
function consumir(itemId,delta){
  const item=actual.items.find(i=>i.id===itemId);if(!item)return;
  const n=item.consumido+delta;if(n<0||n>item.total)return;
  item.consumido=n;save();renderConsumo();feedback();
}
function quitarItem(itemId){actual.items=actual.items.filter(i=>i.id!==itemId);save();renderConsumo();}
function renderConsumo(){
  const el=document.getElementById('consumo-list');
  if(!actual.items.length){el.innerHTML='<div class="empty"><i class="ti ti-shopping-bag"></i>Sin ítems.<br>Ve a "Agregar".</div>';return;}
  el.innerHTML=actual.items.map(item=>{
    const restante=item.total-item.consumido;
    const pct=Math.round((item.consumido/item.total)*100);
    const fc=pct>=100?'full':pct>=70?'warn':'';
    const esCombo=item.tipo==='combo';
    const sub=esCombo?`<strong>${restante}</strong> de ${item.total} ${item.unidad}s restantes`:`${item.consumido} de ${item.total} pedida${item.total>1?'s':''}`;
    return `<div class="item-row">
      <div class="ii">
        <div class="in">${item.nombre}</div>
        <div class="is">${sub}${item.precio>0?' · '+fmtPrice(item.precio)+' c/u':''}</div>
        ${esCombo?`<div class="prog-bar"><div class="prog-fill ${fc}" style="width:${pct}%"></div></div>`:''}
      </div>
      <div class="counter">
        <button class="cbtn" onclick="consumir(${item.id},-1)">−</button>
        <span class="cval">${esCombo?restante:item.consumido}</span>
        <button class="cbtn" onclick="consumir(${item.id},1)">+</button>
        <button class="btn sm danger" onclick="quitarItem(${item.id})" style="padding:5px 8px"><i class="ti ti-trash" style="font-size:14px"></i></button>
      </div>
    </div>`;
  }).join('');
}
function renderCuenta(){
  const el=document.getElementById('cuenta-list');
  if(!actual.items.length){el.innerHTML='<div class="empty">Sin ítems.</div>';document.getElementById('cuenta-total').innerHTML='';return;}
  let total=0;
  el.innerHTML=actual.items.map(item=>{const sub=item.consumido*item.precio;total+=sub;return `<div class="res-row"><span>${item.nombre} × ${item.consumido}</span>${fmtDual(sub)}</div>`;}).join('');
  document.getElementById('cuenta-total').innerHTML=fmtDual(total);
}

function toggleMfTipo(){document.getElementById('mf-combo-f').style.display=document.getElementById('mf-tipo').value==='combo'?'block':'none';}

function eliminarMenuProduct(id){if(!confirm('¿Eliminar este producto?'))return;st.menu=st.menu.filter(m=>m.id!==id);save();renderMenu();}

      </div>
      <button class="btn sm danger" onclick="eliminarMenuProduct(${m.id})"><i class="ti ti-trash" style="font-size:13px"></i></button>
    </div>`).join('')}</div>`;
  }).join('');
}

// ---- CAJA ----
function switchCajaTab(tab){
  ['historial','productos'].forEach(t=>{document.getElementById('cmt-'+t).style.display=t===tab?'block':'none';document.getElementById('ctab-'+t).classList.toggle('active',t===tab);});
}
function renderCaja(){
  const totalUSD=st.caja.reduce((s,p)=>s+p.total,0);
  const num=st.caja.length;const ticket=num>0?totalUSD/num:0;
  const totalBs=st.caja.reduce((s,p)=>s+(p.total*(p.tasa||tasa())),0);
  document.getElementById('caja-metrics').innerHTML=`
    <div class="metric"><div class="ml">Total USD</div><div class="mv success">${fmtUSD(totalUSD)}</div></div>
    <div class="metric"><div class="ml">Total Bs</div><div class="mv success" style="font-size:16px">Bs ${Math.round(totalBs).toLocaleString('es-VE')}</div></div>
    <div class="metric"><div class="ml">Pedidos cobrados</div><div class="mv">${num}</div></div>
    <div class="metric"><div class="ml">Ticket promedio</div><div class="mv" style="font-size:16px">${fmtUSD(ticket)}</div></div>
  `;
  renderCajaHistorial();renderCajaProductos();
}
function renderCajaHistorial(){
  const el=document.getElementById('caja-historial');
  if(!st.caja.length){el.innerHTML='<div class="empty"><i class="ti ti-receipt"></i>Sin pedidos cobrados hoy.</div>';return;}
  el.innerHTML=[...st.caja].reverse().map(p=>{
    const t=p.tasa||tasa();
    return `<div class="hcard">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
        <div><div style="font-size:14px;font-weight:600">${p.nombre}</div>
        <div style="font-size:12px;color:var(--text2)">${p.fecha} · BCV ${t.toFixed(2)}${p.nota?` · 📝 ${p.nota}`:''}</div></div>
        <div style="text-align:right">
          <div style="font-size:14px;font-weight:600;color:var(--success)">${fmtUSD(p.total)}</div>
          <div style="font-size:12px;color:var(--text2)">Bs ${Math.round(p.total*t).toLocaleString('es-VE')}</div>
        </div>
      </div>
      <div style="padding-top:8px;border-top:.5px solid var(--border)">${p.items.map(i=>`<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:3px 0"><span>${i.nombre} × ${i.consumido}</span><span>${fmtUSD(i.subtotal)} / Bs ${Math.round(i.subtotal*t).toLocaleString('es-VE')}</span></div>`).join('')}</div>
    </div>`;
  }).join('');
}
function renderCajaProductos(){
  const el=document.getElementById('caja-productos');
  if(!st.caja.length){el.innerHTML='<div class="empty">Sin ventas registradas.</div>';return;}
  const res={};
  st.caja.forEach(p=>p.items.forEach(i=>{if(!res[i.nombre])res[i.nombre]={nombre:i.nombre,cant:0,total:0};res[i.nombre].cant+=i.consumido;res[i.nombre].total+=i.subtotal;}));
  const sorted=Object.values(res).sort((a,b)=>b.total-a.total);
  el.innerHTML=sorted.map((r,idx)=>`<div class="res-row">
    <div><span style="font-size:12px;color:var(--text2);margin-right:6px">${idx+1}.</span><span style="font-size:13px;font-weight:600">${r.nombre}</span><span style="font-size:12px;color:var(--text2);margin-left:6px">× ${r.cant}</span></div>
    <div style="text-align:right"><div style="font-size:13px;font-weight:600;color:var(--success)">${fmtUSD(r.total)}</div><div style="font-size:11px;color:var(--text2)">Bs ${Math.round(r.total*tasa()).toLocaleString('es-VE')}</div></div>
  </div>`).join('');
}
function resetCaja(){if(!confirm('¿Iniciar nueva jornada?'))return;st.caja=[];save();renderCaja();}
